name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cdi-${{ matrix.target }}.tar.gz cdi
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/cdi.exe" "cdi-windows-x86_64.exe"

      - name: Upload artifact (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cdi-${{ matrix.target }}
          path: cdi-${{ matrix.target }}.tar.gz

      - name: Upload artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cdi-${{ matrix.target }}
          path: cdi-windows-x86_64.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cdi-aarch64-apple-darwin/cdi-aarch64-apple-darwin.tar.gz
            cdi-x86_64-apple-darwin/cdi-x86_64-apple-darwin.tar.gz
            cdi-x86_64-unknown-linux-gnu/cdi-x86_64-unknown-linux-gnu.tar.gz
            cdi-x86_64-pc-windows-msvc/cdi-windows-x86_64.exe
          generate_release_notes: true
